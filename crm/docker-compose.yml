services:
  db_new:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432"
    networks:
      - crm_network

  redis_new:
    image: redis:7-alpine
    ports:
      - "6379"
    networks:
      - crm_network

  api_n:
    build: .
    command: /app/scripts/start_api.sh
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret-key
      - DATABASE_URL=postgres://postgres:postgres@db_new:5432/crm_db
      - REDIS_URL=redis://redis_new:6379/0
      - CELERY_BROKER_URL=redis://redis_new:6379/0
    depends_on:
      - db_new
      - redis_new
    networks:
      - crm_network

  worker_n:
    build: .
    command: /app/scripts/start_worker.sh
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret-key
      - DATABASE_URL=postgres://postgres:postgres@db_new:5432/crm_db
      - REDIS_URL=redis://redis_new:6379/0
      - CELERY_BROKER_URL=redis://redis_new:6379/0
    depends_on:
      - db_new
      - redis_new
    networks:
      - crm_network

  # Nginx Proxy (Optional for local dev, critical for prod)
  nginx_n:
    image: nginx:1.25-alpine
    ports:
      - "8089:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - api_n
    networks:
      - crm_network

volumes:
  postgres_data:
  static_volume:


networks:
  crm_network:
    external: true
