{% extends 'base.html' %}

{% block title %}Roles - Nova CRM{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Roles</h2>
        <button class="btn btn-primary" onclick="openGenericModal('Roles', '/users/roles/', ['Name', 'Description'])"><i data-lucide="plus" size="16"></i> New Roles</button>
    </div>
    
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <p class="text-muted">Data Hierarchy Roles</p>
            <div id="roles-list">Loading...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function fetchData() {
        try {
            const res = await api.get('/users/roles/');
            if(res.results) {
                document.getElementById('roles-list').innerHTML = `<pre>${JSON.stringify(res.results, null, 2)}</pre>`;
            } else {
                document.getElementById('roles-list').innerHTML = `<div class="alert alert-info">No data found.</div>`;
            }
        } catch(e) {
            document.getElementById('roles-list').innerHTML = `<div class="alert alert-warning">Failed to load roles.</div>`;
        }
    }
    fetchData();
</script>
{% endblock %}
