{% extends "base.html" %}
{% load static %}

{% block title %}Tasks - Nova CRM{% endblock %}

{% block content %}
<div class="animate-slide-up space-y-8">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-1">Tasks</h1>
            <p class="text-gray-500 font-medium">Organize your daily workflow and action items.</p>
        </div>
        <div class="flex items-center gap-3">
            <button class="btn-premium-secondary" id="viewCompletedBtn"><i data-lucide="check-square" class="w-4 h-4"></i> View Completed</button>
            <button class="btn-premium-primary" onclick="openAddTaskModal()">
                <i data-lucide="plus" class="w-4 h-4"></i> New Task
            </button>
        </div>
    </header>

    <div class="bg-surface border border-white/5 rounded-2xl shadow-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th class="w-12 text-center">
                            <input type="checkbox" class="w-4 h-4 rounded border-white/10 bg-white/5 text-primary focus:ring-primary/50">
                        </th>
                        <th>Subject</th>
                        <th>Status</th>
                        <th>Due Date</th>
                        <th>Priority</th>
                        <th>Related To</th>
                        <th class="w-16"></th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <!-- Loaded via JS -->
                    <tr>
                        <td colspan="7" class="py-20 text-center">
                            <div class="flex flex-col items-center gap-3">
                                <div class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
                                <p class="text-sm text-gray-500 font-medium">Syncing your agenda...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Task Modal -->
<div id="addTaskModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-background/80 backdrop-blur-sm">
    <div class="bg-surface border border-white/10 w-full max-w-md rounded-2xl shadow-2xl animate-slide-up">
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <h3 class="text-xl font-bold text-white">New Task</h3>
            <button class="p-2 hover:bg-white/5 rounded-lg transition-colors" onclick="closeAddTaskModal()">
                <i data-lucide="x" class="w-5 h-5 text-gray-500"></i>
            </button>
        </div>
        <form id="addTaskForm" class="p-6 space-y-5">
            <div class="space-y-1.5">
                <label class="premium-label">Task Subject</label>
                <input type="text" name="subject" class="premium-input" placeholder="e.g. Follow up with client" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="premium-label">Due Date</label>
                    <input type="date" name="due_date" class="premium-input">
                </div>
                <div class="space-y-1.5">
                    <label class="premium-label">Priority</label>
                    <select name="priority" class="premium-input appearance-none">
                        <option value="High">High</option>
                        <option value="Normal" selected>Normal</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
            </div>
            <div class="pt-4 flex justify-end gap-3">
                <button type="button" class="btn-premium-secondary" onclick="closeAddTaskModal()">Cancel</button>
                <button type="submit" class="btn-premium-primary">Create Task</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/tasks.js' %}"></script>
{% endblock %}
