{% extends 'base.html' %}

{% block title %}Sales Orders - Nova CRM{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Sales Orders</h2>
        <button class="btn btn-primary" onclick="openGenericModal('Sales Orders', '/sales/sales-orders/', ['Name', 'Description'])"><i data-lucide="plus" size="16"></i> New Sales Orders</button>
    </div>
    
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <p class="text-muted">Manage confirmed Sales Orders</p>
            <div id="sales_orders-list">Loading...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function fetchData() {
        try {
            const res = await api.get('/sales/sales-orders/');
            if(res.results) {
                document.getElementById('sales_orders-list').innerHTML = `<pre>${JSON.stringify(res.results, null, 2)}</pre>`;
            } else {
                document.getElementById('sales_orders-list').innerHTML = `<div class="alert alert-info">No data found.</div>`;
            }
        } catch(e) {
            document.getElementById('sales_orders-list').innerHTML = `<div class="alert alert-warning">Failed to load sales_orders.</div>`;
        }
    }
    fetchData();
</script>
{% endblock %}
