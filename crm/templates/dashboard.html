{% extends "base.html" %}
{% load static %}

{% block title %}Dashboard - Nova CRM{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pages/dashboard.css' %}">
{% endblock %}

{% block content %}
<header
    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 32px;">
    <div>
        <h2 class="text-lg font-bold">Dashboard</h2>
        <p class="text-sm text-muted">Overview of your activity and metrics.</p>
    </div>
</header>
<div id="dashboardApp" style="padding: 0 32px;"></div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/dashboard.js' %}"></script>
{% endblock %}
