{% extends 'base.html' %}

{% block title %}Products - Nova CRM{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Products</h2>
            <p class="text-muted text-sm mt-1">Manage your catalog, SKUs, and pricing.</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">
            <i data-lucide="plus" size="16"></i> Add Product
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Product Code</th>
                            <th>Name</th>
                            <th>Unit Price</th>
                            <th>Tax %</th>
                            <th>In Stock</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body">
                        <tr>
                            <td colspan="6" class="text-center py-4 text-muted">Loading products...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Create New Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Product Name <span
                                    class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required
                                placeholder="e.g. Enterprise License">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">SKU / Code</label>
                            <input type="text" name="product_code" class="form-control" placeholder="e.g. ENT-001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Unit Price <span
                                    class="text-danger">*</span></label>
                            <input type="number" step="0.01" name="unit_price" class="form-control" required
                                placeholder="0.00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Tax Percentage</label>
                            <input type="number" step="0.01" name="tax_percentage" class="form-control" value="0.00"
                                placeholder="0.00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Initial Stock</label>
                            <input type="number" name="qty_in_stock" class="form-control" value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Demand Qty</label>
                            <input type="number" name="qty_in_demand" class="form-control" value="0">
                        </div>
                        <div class="col-12">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Description</label>
                            <textarea name="description" class="form-control" rows="3"
                                placeholder="Additional product details..."></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let productModal;

    document.addEventListener("DOMContentLoaded", () => {
        productModal = new bootstrap.Modal(document.getElementById('productModal'));
        fetchProducts();
    });

    async function fetchProducts() {
        try {
            const res = await api.get('/sales/products/');
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = '';

            if (res.results && res.results.length > 0) {
                res.results.forEach(prod => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-primary-600">${prod.product_code || '-'}</td>
                            <td class="fw-medium">${prod.name}</td>
                            <td>$${parseFloat(prod.unit_price).toFixed(2)}</td>
                            <td>${prod.tax_percentage}%</td>
                            <td>
                                <span class="badge ${prod.qty_in_stock > 0 ? 'badge-success' : 'badge-danger'}">
                                    ${prod.qty_in_stock}
                                </span>
                            </td>
                            <td class="text-end">
                                <button class="btn-icon" title="Edit"><i data-lucide="edit" size="16"></i></button>
                            </td>
                        </tr>
                    `;
                });
                lucide.createIcons();
            } else {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">No products found. Start by adding one.</td></tr>`;
            }
        } catch (e) {
            console.error(e);
            document.getElementById('products-table-body').innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Error loading products.</td></tr>`;
        }
    }

    async function saveProduct() {
        const form = document.getElementById('productForm');
        if (!form.reportValidity()) return;

        const payload = Object.fromEntries(new FormData(form).entries());
        try {
            await api.post('/sales/products/', payload);
            productModal.hide();
            form.reset();
            fetchProducts();
        } catch (e) {
            alert('Failed to save product: ' + (e.data?.detail || JSON.stringify(e.data)));
        }
    }
</script>
{% endblock %}
