{% extends "base.html" %}
{% load static %}

{% block title %}Team Management - Nova CRM{% endblock %}

{% block content %}
<div class="animate-slide-up space-y-8">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-1">Team Members</h1>
            <p class="text-gray-500 font-medium">Manage your organization's users, roles, and access.</p>
        </div>
        <button class="btn-premium-primary">
            <i data-lucide="user-plus" class="w-4 h-4"></i> Invite Member
        </button>
    </header>

    <div id="teamApp" class="space-y-6">
        <!-- Team App JS will mount here -->
        <div class="flex flex-col items-center justify-center py-40 gap-4">
            <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            <p class="text-gray-500 font-bold tracking-widest uppercase text-xs">Syncing team directory...</p>
        </div>
    </div>
</div>
{% endblock %}
