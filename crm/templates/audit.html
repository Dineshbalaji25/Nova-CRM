{% extends "base.html" %}
{% load static %}

{% block title %}Audit Logs - Nova CRM{% endblock %}

{% block content %}
<div class="animate-slide-up space-y-8">
    <header>
        <h1 class="text-3xl font-extrabold text-white tracking-tight mb-1">System Audit Logs</h1>
        <p class="text-gray-500 font-medium">Track all system activities and administrative changes.</p>
    </header>

    <div id="auditApp" class="space-y-6">
        <!-- Audit App JS will mount here -->
        <div class="flex flex-col items-center justify-center py-40 gap-4">
            <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            <p class="text-gray-500 font-bold tracking-widest uppercase text-xs">Querying activity stream...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/audit.js' %}"></script>
{% endblock %}
