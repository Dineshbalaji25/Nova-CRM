{% extends 'base.html' %}

{% block title %}Sales Orders - Nova CRM{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Sales Orders</h2>
            <p class="text-muted text-sm mt-1">Confirmed orders ready for fulfillment.</p>
        </div>
        <button class="btn btn-primary" onclick="openSalesOrderModal()">
            <i data-lucide="plus" size="16"></i> New Sales Order
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order Number</th>
                            <th>Subject</th>
                            <th>Company</th>
                            <th>Status</th>
                            <th>Total Amount</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="so-table-body">
                        <tr>
                            <td colspan="6" class="text-center py-4 text-muted">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- SO Modal -->
<div class="modal fade" id="soModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Create Sales Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pb-0">
                <form id="soForm">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Subject <span
                                    class="text-danger">*</span></label>
                            <input type="text" name="subject" class="form-control" required
                                placeholder="e.g. Q4 Server Hardware">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Company <span
                                    class="text-danger">*</span></label>
                            <select name="company" id="companySelectSO" class="form-select" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Status</label>
                            <select name="status" class="form-select">
                                <option value="created">Created</option>
                                <option value="approved">Approved</option>
                                <option value="delivered">Delivered</option>
                            </select>
                        </div>
                        <!-- Simplifying pricing to manual totals for UI demo speed -->
                        <div class="col-md-6 mt-4">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Sub Total</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" name="sub_total" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-6 mt-4">
                            <label class="form-label text-xs fw-bold text-muted text-uppercase">Grand Total <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text fw-bold">$</span>
                                <input type="number" step="0.01" name="grand_total" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-4">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveSalesOrder()">Create Order</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let soModal;

    document.addEventListener("DOMContentLoaded", () => {
        soModal = new bootstrap.Modal(document.getElementById('soModal'));
        fetchSalesOrders();
    });

    async function fetchSalesOrders() {
        try {
            const res = await api.get('/sales/sales-orders/');
            const tbody = document.getElementById('so-table-body');
            tbody.innerHTML = '';

            if (res.results && res.results.length > 0) {
                res.results.forEach(so => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-primary-600">${so.so_number || so.id}</td>
                            <td class="fw-bold text-gray-800">${so.subject}</td>
                            <td>${so.company_details?.name || '-'}</td>
                            <td><span class="badge badge-success">${so.status.toUpperCase()}</span></td>
                            <td class="fw-bold text-success">$${parseFloat(so.grand_total).toFixed(2)}</td>
                            <td class="text-end">
                                <button class="btn-icon" title="View Process"><i data-lucide="truck" size="16"></i></button>
                            </td>
                        </tr>
                    `;
                });
                lucide.createIcons();
            } else {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">No orders found.</td></tr>`;
            }
        } catch (e) {
            console.error(e);
            document.getElementById('so-table-body').innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">Error loading data.</td></tr>`;
        }
    }

    async function openSalesOrderModal() {
        document.getElementById('soForm').reset();
        try {
            const companies = await api.get('/crm/companies/');
            const cSelect = document.getElementById('companySelectSO');
            cSelect.innerHTML = '<option value="">Select Company...</option>';
            (companies.results || []).forEach(c => {
                cSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
            soModal.show();
        } catch (e) {
            alert("Error loading companies.");
        }
    }

    async function saveSalesOrder() {
        const form = document.getElementById('soForm');
        if (!form.reportValidity()) return;

        const payload = Object.fromEntries(new FormData(form).entries());
        try {
            await api.post('/sales/sales-orders/', payload);
            soModal.hide();
            fetchSalesOrders();
        } catch (e) {
            alert('Failed to save sales order: ' + (e.data?.detail || JSON.stringify(e.data)));
        }
    }
</script>
{% endblock %}
