{% extends 'base.html' %}
{% load static %}

{% block title %}Marketing Campaigns - Nova CRM{% endblock %}

{% block content %}
<div class="animate-slide-up space-y-8">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-1">Campaigns</h1>
            <p class="text-gray-500 font-medium">Manage and track your marketing outreach efforts.</p>
        </div>
        <button class="btn-premium-primary" onclick="openGenericModal('Campaign', '/marketing/campaigns/', ['Name', 'Description'])">
            <i data-lucide="plus" class="w-4 h-4"></i> New Campaign
        </button>
    </header>
    
    <div class="bg-surface border border-white/5 rounded-2xl p-8 shadow-2xl">
        <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6">Marketing Campaigns</h3>
        <div id="campaigns-list" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-20 gap-3">
                <div class="w-8 h-8 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Loading campaign data...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function fetchData() {
        try {
            const res = await api.get('/marketing/campaigns/');
            const container = document.getElementById('campaigns-list');
            if(res.results && res.results.length > 0) {
                container.innerHTML = '';
                res.results.forEach(camp => {
                    container.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-white/[0.02] border border-white/5 rounded-xl hover:border-white/10 transition-all">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                                    <i data-lucide="megaphone" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-white">${camp.name}</p>
                                    <p class="text-[11px] text-gray-500 font-medium">${camp.description || 'No description provided'}</p>
                                </div>
                            </div>
                            <button class="p-2 hover:bg-white/5 rounded-lg text-gray-500 hover:text-white transition-all">
                                <i data-lucide="more-vertical" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `;
                });
                if (window.lucide) lucide.createIcons();
            } else {
                container.innerHTML = `<div class="p-10 text-center text-gray-500 font-medium bg-white/[0.02] border border-white/5 rounded-xl">No active campaigns. Start a new marketing initiative to see it here.</div>`;
            }
        } catch(e) {
            document.getElementById('campaigns-list').innerHTML = `<div class="p-4 bg-danger/10 border border-danger/20 text-danger text-xs rounded-xl font-bold">Failed to load campaigns.</div>`;
        }
    }
    fetchData();
</script>
{% endblock %}
