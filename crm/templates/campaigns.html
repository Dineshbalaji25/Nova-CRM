{% extends 'base.html' %}

{% block title %}Campaigns - Nova CRM{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Campaigns</h2>
        <button class="btn btn-primary" onclick="openGenericModal('Campaigns', '/marketing/campaigns/', ['Name', 'Description'])"><i data-lucide="plus" size="16"></i> New Campaigns</button>
    </div>
    
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <p class="text-muted">Marketing Campaigns</p>
            <div id="campaigns-list">Loading...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function fetchData() {
        try {
            const res = await api.get('/marketing/campaigns/');
            if(res.results) {
                document.getElementById('campaigns-list').innerHTML = `<pre>${JSON.stringify(res.results, null, 2)}</pre>`;
            } else {
                document.getElementById('campaigns-list').innerHTML = `<div class="alert alert-info">No data found.</div>`;
            }
        } catch(e) {
            document.getElementById('campaigns-list').innerHTML = `<div class="alert alert-warning">Failed to load campaigns.</div>`;
        }
    }
    fetchData();
</script>
{% endblock %}
