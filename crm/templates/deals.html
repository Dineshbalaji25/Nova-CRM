{% extends "base.html" %}
{% load static %}

{% block title %}Deals Pipeline - Nova CRM{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pages/deals.css' %}">
{% endblock %}

{% block content %}
<header
    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 32px;">
    <div>
        <h2 class="text-lg font-bold">Deals Pipeline</h2>
    </div>
    <div class="flex-column" style="flex-direction: row; gap: 8px;">
        <button class="btn btn-primary" onclick="openAddDealModal()"><i data-lucide="plus" size="16"></i> New
            Deal</button>
    </div>
</header>

<div class="kanban-container">
    <div class="kanban-board" id="kanbanBoard">
        <!-- Columns will be injected here -->
        <div style="padding: 40px; text-align: center; width: 100%;">
            <div class="text-muted">Loading pipeline...</div>
        </div>
    </div>
</div>

<!-- ADD DEAL MODAL -->
<div id="addDealModal" class="modal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card" style="width: 450px; padding: 24px;">
        <h3 style="margin-bottom: 20px;">Add New Deal</h3>
        <form id="addDealForm">
            <div class="form-group">
                <label class="form-label">Deal Title</label>
                <input type="text" name="title" class="form-input" placeholder="e.g. Enterprise Expansion" required>
            </div>
            <div class="form-group">
                <label class="form-label">Amount</label>
                <input type="number" name="amount" class="form-input" placeholder="0.00" step="0.01" required>
            </div>
            <div class="form-group">
                <label class="form-label">Pipeline & Stage</label>
                <select id="stageSelect" name="stage" class="form-input" required>
                    <!-- Stages will be loaded here -->
                </select>
                <input type="hidden" id="pipelineId" name="pipeline">
            </div>
            <div class="form-group">
                <label class="form-label">Company (ID)</label>
                <select id="companySelect" name="company" class="form-input">
                    <option value="">None</option>
                </select>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
                <button type="button" class="btn btn-secondary" onclick="closeAddDealModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Deal</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/deals.js' %}"></script>
{% endblock %}
